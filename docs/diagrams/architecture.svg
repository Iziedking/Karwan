<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 1080" width="1440" height="1080" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arw" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#0A0A0B"/>
    </marker>
    <marker id="arwl" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#6B6B63"/>
    </marker>
  </defs>

  <rect width="1440" height="1080" fill="#FAFAF7"/>

  <!-- header -->
  <text x="60" y="62" font-size="30" font-weight="800" fill="#0A0A0B" letter-spacing="-0.5">Karwan</text>
  <text x="171" y="62" font-size="17" fill="#6B6B63">SME trade finance on Arc</text>
  <rect x="1140" y="40" width="240" height="30" fill="#0A0A0B"/>
  <text x="1260" y="60" font-size="12.5" font-weight="700" fill="#D8FF3D" text-anchor="middle" letter-spacing="1.1">ARC TESTNET · 5042002</text>
  <line x1="60" y1="86" x2="1380" y2="86" stroke="#E6E4DC" stroke-width="1.5"/>

  <!-- LAYER 1: ACTORS -->
  <text x="60" y="126" font-size="11" font-weight="700" fill="#9DB84B" letter-spacing="1.6">01 · PARTIES</text>
  <rect x="60" y="140" width="400" height="74" fill="#FFFFFF" stroke="#0A0A0B" stroke-width="1.5"/>
  <text x="80" y="172" font-size="16" font-weight="700" fill="#0A0A0B">SME buyer</text>
  <text x="80" y="194" font-size="13" fill="#6B6B63">Importer placing the order</text>

  <rect x="520" y="140" width="400" height="74" fill="#FFFFFF" stroke="#0A0A0B" stroke-width="1.5"/>
  <text x="540" y="172" font-size="16" font-weight="700" fill="#0A0A0B">SME supplier</text>
  <text x="540" y="194" font-size="13" fill="#6B6B63">Exporter shipping the goods</text>

  <rect x="980" y="140" width="400" height="74" fill="#FFFFFF" stroke="#0A0A0B" stroke-width="1.5"/>
  <text x="1000" y="172" font-size="16" font-weight="700" fill="#0A0A0B">Financier</text>
  <text x="1000" y="194" font-size="13" fill="#6B6B63">Funds invoices and purchase orders</text>

  <text x="60" y="240" font-size="12.5" fill="#6B6B63">Sign in with email, a passkey, or a self-custody wallet. No seed phrase, no gas token to buy.</text>

  <line x1="720" y1="252" x2="720" y2="286" stroke="#0A0A0B" stroke-width="1.5" marker-end="url(#arw)"/>

  <!-- LAYER 2: SURFACES -->
  <text x="60" y="316" font-size="11" font-weight="700" fill="#9DB84B" letter-spacing="1.6">02 · PRODUCT SURFACES</text>
  <rect x="60" y="330" width="1320" height="92" fill="#FFFFFF" stroke="#0A0A0B" stroke-width="1.5"/>

  <rect x="84" y="352" width="298" height="48" fill="#F4F4F1"/>
  <text x="100" y="372" font-size="14" font-weight="700" fill="#0A0A0B">Trade desk</text>
  <text x="100" y="390" font-size="12" fill="#6B6B63">Milestone escrow, proof of delivery</text>

  <rect x="398" y="352" width="298" height="48" fill="#F4F4F1"/>
  <text x="414" y="372" font-size="14" font-weight="700" fill="#0A0A0B">Financier desk</text>
  <text x="414" y="390" font-size="12" fill="#6B6B63">Factor invoices, fund POs</text>

  <rect x="712" y="352" width="298" height="48" fill="#F4F4F1"/>
  <text x="728" y="372" font-size="14" font-weight="700" fill="#0A0A0B">Credit passport</text>
  <text x="728" y="390" font-size="12" fill="#6B6B63">Public, portable, on chain</text>

  <rect x="1026" y="352" width="330" height="48" fill="#F4F4F1"/>
  <text x="1042" y="372" font-size="14" font-weight="700" fill="#0A0A0B">Fund and withdraw</text>
  <text x="1042" y="390" font-size="12" fill="#6B6B63">USDC in and out, 12 chains</text>

  <line x1="720" y1="422" x2="720" y2="456" stroke="#0A0A0B" stroke-width="1.5" marker-end="url(#arw)"/>

  <!-- LAYER 3: SERVICES -->
  <text x="60" y="486" font-size="11" font-weight="700" fill="#9DB84B" letter-spacing="1.6">03 · KARWAN SERVICES</text>
  <rect x="60" y="500" width="1320" height="88" fill="#FFFFFF" stroke="#0A0A0B" stroke-width="1.5"/>
  <text x="84" y="530" font-size="13.5" font-weight="700" fill="#0A0A0B">Buyer agent</text>
  <text x="84" y="551" font-size="12" fill="#6B6B63">Sources, scores, negotiates</text>
  <text x="84" y="572" font-size="12" fill="#6B6B63">Never funds without approval</text>

  <line x1="330" y1="516" x2="330" y2="572" stroke="#E6E4DC" stroke-width="1"/>
  <text x="354" y="530" font-size="13.5" font-weight="700" fill="#0A0A0B">Seller agent</text>
  <text x="354" y="551" font-size="12" fill="#6B6B63">Prices, bids, counters</text>
  <text x="354" y="572" font-size="12" fill="#6B6B63">Vets the buyer before quoting</text>

  <line x1="620" y1="516" x2="620" y2="572" stroke="#E6E4DC" stroke-width="1"/>
  <text x="644" y="530" font-size="13.5" font-weight="700" fill="#0A0A0B">Security agent</text>
  <text x="644" y="551" font-size="12" fill="#6B6B63">Scans every delivery proof</text>
  <text x="644" y="572" font-size="12" fill="#6B6B63">Holds release on a bad link</text>

  <line x1="900" y1="516" x2="900" y2="572" stroke="#E6E4DC" stroke-width="1"/>
  <text x="924" y="530" font-size="13.5" font-weight="700" fill="#0A0A0B">Settlement watchers</text>
  <text x="924" y="551" font-size="12" fill="#6B6B63">Delivery, repayment, expiry,</text>
  <text x="924" y="572" font-size="12" fill="#6B6B63">yield, and bridge recovery</text>

  <line x1="1180" y1="516" x2="1180" y2="572" stroke="#E6E4DC" stroke-width="1"/>
  <text x="1204" y="530" font-size="13.5" font-weight="700" fill="#0A0A0B">x402 client</text>
  <text x="1204" y="551" font-size="12" fill="#6B6B63">Agents buy the data</text>
  <text x="1204" y="572" font-size="12" fill="#6B6B63">they negotiate with</text>

  <line x1="720" y1="588" x2="720" y2="622" stroke="#0A0A0B" stroke-width="1.5" marker-end="url(#arw)"/>

  <!-- LAYER 4: CIRCLE (hero) -->
  <text x="60" y="652" font-size="11" font-weight="700" fill="#9DB84B" letter-spacing="1.6">04 · THE CIRCLE STACK</text>
  <rect x="60" y="666" width="1320" height="122" fill="#0A0A0B"/>
  <rect x="60" y="666" width="1320" height="5" fill="#D8FF3D"/>

  <text x="84" y="704" font-size="13.5" font-weight="700" fill="#D8FF3D">Developer-Controlled</text>
  <text x="84" y="722" font-size="13.5" font-weight="700" fill="#D8FF3D">Wallets</text>
  <text x="84" y="746" font-size="12" fill="#B9B9B0">Identity and agent</text>
  <text x="84" y="764" font-size="12" fill="#B9B9B0">wallets. No keys held</text>
  <text x="84" y="782" font-size="12" fill="#B9B9B0">by the user.</text>

  <line x1="350" y1="690" x2="350" y2="770" stroke="#3A3A38" stroke-width="1"/>
  <text x="374" y="704" font-size="13.5" font-weight="700" fill="#D8FF3D">App Kit</text>
  <text x="374" y="722" font-size="13.5" font-weight="700" fill="#D8FF3D">and Bridge Kit</text>
  <text x="374" y="746" font-size="12" fill="#B9B9B0">Bridge, unified balance,</text>
  <text x="374" y="764" font-size="12" fill="#B9B9B0">and the Forwarding</text>
  <text x="374" y="782" font-size="12" fill="#B9B9B0">Service.</text>

  <line x1="640" y1="690" x2="640" y2="770" stroke="#3A3A38" stroke-width="1"/>
  <text x="664" y="704" font-size="13.5" font-weight="700" fill="#D8FF3D">Gateway</text>
  <text x="664" y="722" font-size="13.5" font-weight="700" fill="#D8FF3D">unified balance</text>
  <text x="664" y="746" font-size="12" fill="#B9B9B0">One pooled USDC balance</text>
  <text x="664" y="764" font-size="12" fill="#B9B9B0">across 12 chains. Also the</text>
  <text x="664" y="782" font-size="12" fill="#B9B9B0">rail that settles x402.</text>

  <line x1="960" y1="690" x2="960" y2="770" stroke="#3A3A38" stroke-width="1"/>
  <text x="984" y="704" font-size="13.5" font-weight="700" fill="#D8FF3D">CCTP V2</text>
  <text x="1002" y="746" font-size="12" fill="#B9B9B0"/>
  <text x="984" y="746" font-size="12" fill="#B9B9B0">USDC in and out of Arc,</text>
  <text x="984" y="764" font-size="12" fill="#B9B9B0">both directions, across</text>
  <text x="984" y="782" font-size="12" fill="#B9B9B0">12 chains.</text>

  <line x1="1230" y1="690" x2="1230" y2="770" stroke="#3A3A38" stroke-width="1"/>
  <text x="1254" y="704" font-size="13.5" font-weight="700" fill="#D8FF3D">USDC</text>
  <text x="1254" y="746" font-size="12" fill="#B9B9B0">The settlement asset,</text>
  <text x="1254" y="764" font-size="12" fill="#B9B9B0">and the gas token</text>
  <text x="1254" y="782" font-size="12" fill="#B9B9B0">on Arc.</text>

  <line x1="720" y1="788" x2="720" y2="822" stroke="#0A0A0B" stroke-width="1.5" marker-end="url(#arw)"/>

  <!-- LAYER 5: CONTRACTS -->
  <text x="60" y="852" font-size="11" font-weight="700" fill="#9DB84B" letter-spacing="1.6">05 · CONTRACTS ON ARC</text>
  <rect x="60" y="866" width="1320" height="106" fill="#FFFFFF" stroke="#0A0A0B" stroke-width="1.5"/>

  <rect x="84" y="888" width="196" height="30" fill="#D8FF3D"/>
  <text x="182" y="908" font-size="12.5" font-weight="700" fill="#0A0A0B" text-anchor="middle">KarwanEscrow</text>
  <text x="182" y="936" font-size="11.5" fill="#6B6B63" text-anchor="middle">Milestone release</text>

  <rect x="296" y="888" width="196" height="30" fill="#D8FF3D"/>
  <text x="394" y="908" font-size="12.5" font-weight="700" fill="#0A0A0B" text-anchor="middle">InvoiceRegistry</text>
  <text x="394" y="936" font-size="11.5" fill="#6B6B63" text-anchor="middle">Factoring</text>

  <rect x="508" y="888" width="196" height="30" fill="#D8FF3D"/>
  <text x="606" y="908" font-size="12.5" font-weight="700" fill="#0A0A0B" text-anchor="middle">POFinancing</text>
  <text x="606" y="936" font-size="11.5" fill="#6B6B63" text-anchor="middle">Proof of delivery</text>

  <rect x="720" y="888" width="196" height="30" fill="#0A0A0B"/>
  <text x="818" y="908" font-size="12.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">Reputation</text>
  <text x="818" y="936" font-size="11.5" fill="#6B6B63" text-anchor="middle">ERC-8004 passport</text>

  <rect x="932" y="888" width="196" height="30" fill="#0A0A0B"/>
  <text x="1030" y="908" font-size="12.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">Vault</text>
  <text x="1030" y="936" font-size="11.5" fill="#6B6B63" text-anchor="middle">Stake as insurance</text>

  <rect x="1144" y="888" width="212" height="30" fill="#0A0A0B"/>
  <text x="1250" y="908" font-size="12.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">Treasury</text>
  <text x="1250" y="936" font-size="11.5" fill="#6B6B63" text-anchor="middle">Idle funds earn yield</text>

  <text x="84" y="962" font-size="11.5" fill="#6B6B63">Also live: KarwanJobBoard, KarwanBusinessRegistry, KarwanYieldDistributor. Every address is published and verified on Arcscan.</text>

  <!-- yield out -->
  <line x1="1250" y1="972" x2="1250" y2="1004" stroke="#6B6B63" stroke-width="1.5" marker-end="url(#arwl)"/>
  <rect x="1064" y="1010" width="292" height="42" fill="#FFFFFF" stroke="#9DB84B" stroke-width="1.5"/>
  <text x="1210" y="1030" font-size="13" font-weight="700" fill="#0A0A0B" text-anchor="middle">Hashnote USYC</text>
  <text x="1210" y="1046" font-size="11.5" fill="#6B6B63" text-anchor="middle">Tokenized Treasury bills, live on Arc</text>

  <!-- money rail -->
  <rect x="60" y="1010" width="960" height="42" fill="#F4F4F1" stroke="#E6E4DC" stroke-width="1.5"/>
  <text x="84" y="1029" font-size="12" font-weight="700" fill="#0A0A0B">USDC IN AND OUT</text>
  <text x="84" y="1046" font-size="11.5" fill="#6B6B63">Ethereum · Base · Arbitrum · Optimism · Polygon · Avalanche · Unichain · Sei · Sonic · World Chain · HyperEVM · Solana</text>
</svg>
