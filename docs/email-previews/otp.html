<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="color-scheme" content="light only" />
<meta name="supported-color-schemes" content="light" />
<title>Karwan sign-in code</title>
<style>
  :root { color-scheme: light only; supported-color-schemes: light; }
  body, table, td, div, p, a, span { color-scheme: light only !important; }
  /* Lock the cream canvas + ink card against Gmail's auto-invert. */
  .k-canvas { background: #f3efe6 !important; }
  .k-card { background: #ffffff !important; }
  .k-header { background: #0e0e0e !important; }
  .k-ink { color: #0e0e0e !important; }
  .k-sub { color: #3a352c !important; }
  .k-muted { color: #8a8478 !important; }
  .k-lime { color: #afc95b !important; }
  /* When a client DOES force dark mode regardless, flip to a brand-aware
     dark palette (cream-on-ink) so the email still reads as Karwan rather
     than as an unstyled message. */
  @media (prefers-color-scheme: dark) {
    .k-canvas { background: #1c1a16 !important; }
    .k-card { background: #1c1a16 !important; }
    .k-ink, .k-sub { color: #f3efe6 !important; }
    .k-muted { color: #b8b0a0 !important; }
    .k-divider { border-color: rgba(243,239,230,0.16) !important; }
  }
</style>
</head>
<body class="k-canvas" style="margin:0;padding:0;background:#f3efe6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;color:#0e0e0e;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" class="k-canvas" style="background:#f3efe6;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="520" cellpadding="0" cellspacing="0" border="0" class="k-card" style="max-width:520px;width:100%;background:#ffffff;border:1px solid #e6e2d8;border-radius:18px 18px 18px 5px;overflow:hidden;">
          <!-- Header: ink band + lime accent strip below for brand recognition
               even when a stubborn client neutralises the bg color. -->
          <tr>
            <td class="k-header" style="background:#0e0e0e;padding:24px 28px;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="vertical-align:middle;padding-right:12px;"><img src="cid:karwan-logo" width="36" height="36" alt="Karwan" style="display:block;border-radius:6px;" /></td>
                  <td style="vertical-align:middle;">
                    <div style="font-size:18px;font-weight:800;letter-spacing:0.04em;color:#ffffff;text-transform:uppercase;line-height:1;">Karwan<span class="k-lime" style="color:#afc95b;">.</span></div>
                    <div style="margin-top:4px;font-size:10px;letter-spacing:0.18em;color:rgba(255,255,255,0.55);text-transform:uppercase;font-family:'SFMono-Regular',Menlo,Consolas,monospace;">SIGN-IN CODE</div>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding:0;line-height:0;font-size:0;">
              <div style="height:3px;background:#afc95b;line-height:0;font-size:0;">&nbsp;</div>
            </td>
          </tr>

          
          <tr>
            <td style="padding:36px 28px 12px 28px;text-align:center;">
              <div style="font-size:12px;letter-spacing:0.18em;color:#8a8478;text-transform:uppercase;font-family:'SFMono-Regular',Menlo,Consolas,monospace;margin-bottom:14px;">Your code</div>
              <div style="display:inline-block;padding:18px 28px;background:#f6f3ea;border:1px solid #e6e2d8;border-radius:14px 14px 14px 4px;">
                <div style="font-family:'SFMono-Regular',Menlo,Consolas,monospace;font-variant-numeric:tabular-nums;font-size:36px;font-weight:800;letter-spacing:0.32em;color:#0e0e0e;line-height:1;padding-right:0.32em;">447301</div>
              </div>
            </td>
          </tr>

          <tr>
            <td style="padding:18px 28px 8px 28px;text-align:center;">
              <p style="margin:0;font-size:14px;line-height:1.55;color:#3a352c;">
                Enter this code in the sign-in modal to access your Karwan account.
              </p>
              <p style="margin:10px 0 0 0;font-size:13px;line-height:1.55;color:#7a7466;">
                Expires in 10 minutes. Five wrong tries voids it.
              </p>
            </td>
          </tr>
  

          <tr>
            <td style="padding:24px 28px 24px 28px;">
              <hr class="k-divider" style="border:none;border-top:1px solid #e6e2d8;margin:0 0 16px 0;" />
              <p class="k-muted" style="margin:0;font-size:12px;line-height:1.5;color:#8a8478;">
                Didn&#39;t request this? Ignore the email. No account changes happen until a code is entered.
              </p>
              <p class="k-muted" style="margin:14px 0 0 0;font-size:10px;letter-spacing:0.18em;color:#b8b0a0;text-transform:uppercase;font-family:'SFMono-Regular',Menlo,Consolas,monospace;">
                Karwan&nbsp;&middot;&nbsp;Agentic settlement on Arc
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
