# Karwan backend on a VPS, behind Caddy for TLS + reverse proxy.
#
# Files on the VPS:
#   ~/karwan/
#     ├── docker-compose.yml   (this file)
#     ├── .env                 (filled from .env.example; NEVER commit real values)
#     ├── Caddyfile            (see commands below; auto-managed certs)
#     └── data/                (host-side mount for the backend's flat-file fallback)
#
# First-time setup on the VPS:
#   docker compose pull
#   docker compose up -d
#   docker compose logs -f karwan-api
#
# Roll a new image:
#   docker compose pull && docker compose up -d --remove-orphans
#
# DNS: point api.karwan.site at the VPS IP. Caddy negotiates TLS automatically
# via Let's Encrypt the first time the domain resolves.

services:
  karwan-api:
    # Two ways to source the image:
    #   1. Build locally on the VPS from the repo:
    #      build: { context: ., dockerfile: Dockerfile }
    #   2. Pull from GHCR (recommended once CI publishes images):
    #      image: ghcr.io/<your-gh-user>/karwan-api:latest
    image: ghcr.io/iziedking/karwan/karwan-api:latest
    container_name: karwan-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Belt-and-braces: production mode + bind on the container's port.
      NODE_ENV: production
      PORT: 8787
    volumes:
      # Persist the flat-file fallback store across container rebuilds.
      # When DATABASE_URL is set, most of these files stay empty; the dir is
      # still needed for bridge state + briefs that haven't migrated.
      - ./data:/app/backend/data
      # Read-only mount of .env so the in-container backup script can tar
      # it alongside data/. Without this the backup misses the file that
      # holds CIRCLE_ENTITY_SECRET, DATABASE_URL, contract addresses, and
      # the B2 credentials themselves. Mounted read-only so a compromised
      # container can't rewrite your secrets file.
      - ./.env:/app/backend/.env-snapshot:ro
      # Read-only mount of host-crontab.txt so the backup script can ship
      # the host crontab alongside the DB and data. The cron line that
      # fires the backup also refreshes this file via
      # `crontab -l > ~/karwan/host-crontab.txt` so the snapshot is always
      # current. Touch the file once before first `docker compose up -d`
      # so Docker mounts it as a file rather than creating a directory.
      - ./host-crontab.txt:/app/backend/.host-crontab-snapshot:ro
    # The container listens on 8787 internally. We DON'T publish to host —
    # only Caddy talks to it over the internal network.
    expose:
      - "8787"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8787/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  caddy:
    image: caddy:2-alpine
    container_name: karwan-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - karwan-api
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  caddy_data:
  caddy_config:
