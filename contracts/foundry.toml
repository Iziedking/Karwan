[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.28"
optimizer = true
# runs=1 minimises deployed bytecode: KarwanEscrow sits at the EIP-170 ceiling,
# so we optimise for size over marginal runtime gas (testnet/challenge context).
optimizer_runs = 1
# viaIR is REQUIRED: the legacy pipeline can't compile the escrow under the
# stack limit, and viaIR (fixed in solc >=0.8.26) also reclaims ~1.6KB of
# bytecode that brings the escrow under the size cap.
via_ir = true
verbosity = 2
gas_reports = ["*"]

remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/"
]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false

[rpc_endpoints]
arc_testnet = "${ARC_TESTNET_RPC_URL}"

[etherscan]
arc_testnet = { key = "${ARCSCAN_API_KEY}", url = "https://testnet.arcscan.app/api" }
