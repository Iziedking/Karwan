name: Publish backend image

# Build the karwan-api Docker image and push it to GitHub Container Registry.
# Runs on every push to main when the backend or Dockerfile changes, plus
# on manual dispatch. The deploy-backend workflow pulls this tag on the VPS.

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/publish-backend-image.yml'
  workflow_dispatch:

concurrency:
  group: publish-backend-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      # Needed to push to GHCR with the auto-provisioned GITHUB_TOKEN.
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          SHA=${GITHUB_SHA::7}
          echo "image=ghcr.io/${REPO_LOWER}/karwan-api" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Two tags every push: :latest (rolling) + :<sha> (immutable).
          # Production should pin to :<sha> in compose for rollback safety.
          tags: |
            ${{ steps.tags.outputs.image }}:latest
            ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.sha }}
          # Cache layers in GHCR so subsequent builds reuse the install stage.
          cache-from: type=registry,ref=${{ steps.tags.outputs.image }}:buildcache
          cache-to: type=registry,ref=${{ steps.tags.outputs.image }}:buildcache,mode=max
          platforms: linux/amd64
