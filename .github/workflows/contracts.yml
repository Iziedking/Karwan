name: Contracts

# Foundry build + tests for the Solidity workspace. Split out of ci.yml and
# path-filtered so it only runs when contracts/ actually changes. A backend or
# frontend push no longer triggers (and fails) this job. The `forge build
# --sizes` gate stays: it flags any contract over the EIP-170 24 KB runtime
# limit, which is load-bearing before a mainnet deploy.

on:
  push:
    branches: [main]
    paths:
      - 'contracts/**'
      - '.github/workflows/contracts.yml'
  pull_request:
    paths:
      - 'contracts/**'
      - '.github/workflows/contracts.yml'

concurrency:
  group: contracts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Foundry tests
    runs-on: ubuntu-latest
    # viaIR (required to keep KarwanEscrow under the EIP-170 limit on solc 0.8.28)
    # roughly doubles compile time, so allow headroom over the ~8 min build+test.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: forge build
        working-directory: contracts
        run: forge build --sizes

      - name: forge test
        working-directory: contracts
        run: forge test -vv
