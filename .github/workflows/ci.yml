name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel older runs on the same ref so we don't queue up redundant work.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Backend typecheck
        run: npm --prefix backend run typecheck

      - name: Frontend typecheck
        run: npm --prefix frontend run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Frontend build
        # Use placeholder env vars so Next.js build doesn't fail on missing
        # NEXT_PUBLIC_* references. CI only checks the build succeeds; the
        # real values are injected by Vercel at deploy time.
        env:
          NEXT_PUBLIC_BACKEND_URL: https://api.karwan.site
          NEXT_PUBLIC_BASE_SEPOLIA_RPC: ''
          NEXT_PUBLIC_SEPOLIA_RPC: ''
        run: npm --prefix frontend run build
